<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>升级到高级版 - PR CodeLens</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #666;
    }
    .price {
      text-align: center;
      margin-bottom: 32px;
      padding: 24px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 12px;
    }
    .price .amount {
      font-size: 48px;
      font-weight: 700;
      color: white;
    }
    .price .period {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 4px;
    }
    .price .saving {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 8px;
    }
    .features {
      margin-bottom: 32px;
    }
    .feature {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .feature:last-child {
      border-bottom: none;
    }
    .feature-icon {
      font-size: 24px;
      margin-right: 12px;
      width: 32px;
      text-align: center;
    }
    .feature-text {
      font-size: 15px;
      color: #444;
    }
    .premium-tag {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }
    .cta {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      width: 100%;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      color: #999;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px 16px;
    }
    .back-btn:hover {
      color: #666;
      background: rgba(0,0,0,0.05);
    }
    .guarantee {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #999;
    }

    .qr-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .qr-modal.active {
      display: flex;
    }
    .qr-content {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .qr-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .qr-image {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-image img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }
    .qr-price {
      font-size: 32px;
      font-weight: 700;
      color: #f5576c;
      margin: 10px 0;
    }
    .qr-tips {
      font-size: 14px;
      color: #666;
      margin-top: 16px;
      line-height: 1.6;
    }
    .qr-close {
      margin-top: 24px;
      padding: 10px 30px;
      background: #f5f5f5;
      color: #666;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .qr-close:hover {
      background: #e8e8e8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🚀 fancypants</div>
      <h1 class="title">解锁高级功能</h1>
      <p class="subtitle">让代码审查事半功倍</p>
    </div>

    <div class="price">
      <div class="amount">¥9</div>
      <div class="period">每月订阅</div>
      <div class="saving">✨ 30天免费试用，随时取消</div>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <span class="feature-text">AI 智能代码审查</span>
      </div>
      <div class="feature">
        <span class="feature-icon">⚡</span>
        <span class="feature-text">批量操作（打标签、评论）</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📊</span>
        <span class="feature-text">团队协作统计</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📝</span>
        <span class="feature-text">PR 模板管理 <span class="premium-tag">Pro</span></span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <span class="feature-text">高级筛选功能</span>
      </div>
      <div class="feature">
        <span class="feature-icon">💬</span>
        <span class="feature-text">智能评论建议</span>
      </div>
    </div>

    <div class="cta">
      <button class="btn" id="subscribeBtn">立即升级 →</button>
    </div>

    <div style="text-align: center;">
      <button class="back-btn" id="backBtn">← 返回免费版</button>
    </div>

    <div class="guarantee">
      🔒 安全支付 ·面 7天退款保证
    </div>
  </div>

  <div class="qr-modal" id="qrModal">
    <div class="qr-content">
      <div class="qr-title">🔐 支付宝扫码支付</div>
      <div class="qr-price">¥9.00</div>
      <div class="qr-image" id="qrImage">
        <div style="text-align: center; padding: 40px; font-size: 16px; color: #666;">加载中...</div>
      </div>
      <div class="qr-tips">
        1. 打开支付宝，扫一扫上方二维码<br>
        2. 完成支付后自动激活高级版<br>
        3. 如有问题，请联系客服
      </div>
      <button class="qr-close" id="qrClose">取消支付</button>
    </div>
  </div>

  <script src="upgrade.js"></script>
</body>
</html>
