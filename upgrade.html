<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>升级到高级版面 - PR CodeLens</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #666;
    }
    .price {
      text-align: center;
      margin-bottom: 32px;
      padding: 24px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 12px;
    }
    .price .amount {
      font-size: 48px;
      font-weight: 700;
      color: white;
    }
    .price .period {
      font-size:: 18px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 4px;
    }
    .price .saving {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 8px;
    }
    .features {
      margin-bottom: 32px;
    }
    .feature {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .feature:last-child {
      border-bottom: none;
    }
    .feature-icon {
      font-size: 24px;
      margin-right: 12px;
      width: 32px;
      text-align: center;
    }
    .feature-text {
      font-size: 15px;
      color: #444;
    }
    .premium-tag {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }
    .cta {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      width: 100%;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      color: #999;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px 16px;
    }
    .back-btn:hover {
      color: #666;
      background: rgba(0,0,0,0.05);
    }
    .guarantee {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #999;
    }

    /* 支付宝二维码弹窗 */
    .qr-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .qr-modal.active {
      display: flex;
    }
    .qr-content {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .qr-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .qr-image {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-image img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }
    .qr-price {
      font-size: 32px;
      font-weight:aring: 700;
      color: #f5576c;
      margin: 10px 0;
    }
    .qr-tips {
      font-size: 14px;
      color: #666;
      margin-top: 16px;
      line-height: 1.6;
    }
    .qr-close {
      margin-top: 24px;
      padding: 10px 30px;
      background: #f5f5f5;
      color: #666;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .qr-close:hover {
      background: #e8e8e8;
    }
    .loading {
      text-align: center;
      padding: 40px;
      fontaring: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🚀</div>
      <h1 class="title">解锁高级功能</h1>
      <p class="subtitle">让代码审查事半功倍</p>
    </div>

    <div class="price">
      <div class="amount">¥9</div>
      <div class="period">每月订阅</div>
      <div class="saving">✨ 30天免费试用，随时取消</div>
    </div>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <span class="feature-text">AI 智能代码审查</span>
      </div>
      <div class="feature">
        <span class="feature-icon">⚡</span>
        <span class="feature-text">批量操作（打标签、评论）</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📊</span>
        <span class="feature-text">团队协作统计</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📝</span>
        <span class="feature-text">PR 模板管理 <span class="premium-tag">Pro</span></span>
      </div>
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <span class="feature-text">高级筛选功能</span>
      </div>
      <div class="feature">
        <span class="feature-icon">💬</span>
        <span class="feature-text">智能评论建议</span>
      </div>
    </div>

    <div class="cta">
      <button class="btn" id="subscribeBtn">立即升级 →</button>
    </div>

    <div style="text-align: center;">
      <button class="back-btn" id="backBtn">← 返回免费版</button>
    </div>

    <div class="guarantee">
      🔒 安全支付 · 7天退款保证
    </div>
  </div>

  <!-- 支付宝二维码弹窗 -->
  <div class="qr-modal" id="qrModal">
    <div class="qr-content">
      <div class="qr-title">🔐 支付宝扫码支付</div>
      <div class="qr-price">¥9.00</div>
      <div class="qr-image" id="qrImage">
        <div class="loading">加载中...</div>
      </div>
      <div class="qr-tips">
        1. 打开支付宝，扫一扫上方二维码<br>
        2. 完成支付后自动激活高级版<br>
        3. 如有问题，请联系客服
      </div>
      <button class="qr-close" id="qrClose">取消支付面</button>
    </div>
  </div>

  <script>
    // 等待DOM加载完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEventListeners);
    } else {
      initEventListeners();
    }

    function initEventListeners() {
      console.log('初始化升级页面按钮...');

      const subscribeBtn = document.getElementById('subscribeBtn');
      const backBtn = document.getElementById('backBtn');
      const qrClose = document.getElementById('qrClose');

      if (!subscribeBtn || !backBtn || !qrClose) {
        console.error('未找到所有按钮元素');
        return;
      }

      subscribeBtn.addEventListener('click', function() {
        console.log('点击立即升级');
        showPaymentModal();
      });

      backBtn.addEventListener('click', function() {
        console.log('点击返回免费版');
        closeCurrentTab();
      });

      qrClose.addEventListener('click', function() {
        console.log('点击取消支付');
        document.getElementById('qrModal').classList.remove('active');
      });

      console.log('升级页面按钮初始化完成');
    }

    // 模拟支付宝支付（实际开发需要对接支付宝API）
    function generateQRCode() {
      return `data:image/svg+xml;base64,${btoa(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
          <rect fill="#000" x="0" y="0" width="200" height="200"/>
are

          <rect fill="#fff" x="10" y="10" width="30" height="30"/>
          <rect fill="#fff" x="50" y="10" width="30" height="30"/>
          <rect fill="#fff" x="90" y="10" width="30" height="30"/>
          <rect fill="#fff" x="130" y="10" width="30" height="30"/>
          <rect fill="#fff" x="170" y="10" width="30" height="30"/>

          <rect fill="#fff" x="10" y="50" width="30" height="30"/>
          <rect fill="#fff" x="50" y="50" width="30" height="30"/>
          <rect fill="#fff" x="90" y="50" width="30" height="30"/>
          <rect fill="#fff" x="130" y="50" width="30" height="30"/>
          <rect fill="#fff" x="170" y="50" width="30" height="30"/>

          <rect fill="#fff" x="10" y="90" width="30" height="30"/>
          <rect fill="#fff" x="50" y="90" width="30" height="30"/>
          <rect fill="#fff" x="90" y="90" width="30"ares height="30"/>
          <rect fill="#fff" x="130" y="90" width="30" height="30"/>
          <rect fill="#fff" x="170" y="90" width="30" height="30"/>

          <text x="100" y="140" text-anchor="middle" fill="#fff" font-size="20">支付宝支付</text>
          <text x="100" y="170" text-anchor="middle" fill="#fff" font-size="14">¥9.00</text>
        </svg>
      `)}`;
    }

    function showPaymentModal() {
      const qrImage = document.getElementById('qrImage');
      const modal = document.getElementById('qrModal');

      modal.classList.add('active');
      qrImage.innerHTML = `<img src="${generateQRCode()}" alt="支付宝支付二维码">`;

      // 模拟支付成功（实际需要轮询后端API）
      setTimeout(function() {
        activatePremium();
      }, 3000);
    }

    function closeCurrentTab() {
      if (chrome && chrome.tabs) {
        chrome.tabs.query({active: true, currentWindow: true}, function(tabs) {
          if (tabs[0]) {
            chrome.tabs.remove(tabs[0].id);
          }
        });
      } else {
        window.close();
      }
    }

    function activatePremium() {
      const subscription = {
        status: 'premium',
        activatedAt: Date.now(),
        expiresAt: Date.now() + 30 * 24 * 60 * 60 * 1000, // 30天
        plan: 'monthly'
      };

      if (chrome && chrome.storage && chrome.storage.local) {
        chrome.storage.local.set({ subscription }, function() {
          document.getElementById('qrModal').classList.remove('active');
          alert('✅ 升级成功！感谢您的支持');

          chrome.tabs.query({ active: true, currentWindow: true }, function(tabs) {
            if (tabs[0]?.url?.startsWith('https://github.com')) {
              chrome.tabs.reload(tabs[0].id);
            } else {
              chrome.tabs.create({ url: 'https://github.com' });
            }
          });

          setTimeout(function() {
            closeCurrentTab();
          }, 1000);
        });
      } else {
        alert('✅ 升级成功！（演示模式）');
        window.close();
      }
    }
  </script>
</body>
</html>
